# Aeon configuration
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.
# Set var: "value" to pass a default parameter to the skill.
# Set model: "claude-sonnet-4-6" per skill to override the default model (cost optimization).

skills:
  # --- Morning aggregation (7 AM UTC) ---
  morning-brief: { enabled: true, schedule: "0 7 * * *" }
  daily-routine: { enabled: true, schedule: "0 7 * * *" }
  rss-digest: { enabled: true, schedule: "0 7 * * *" }
  hacker-news-digest: { enabled: true, schedule: "0 7 * * *" } # top HN stories filtered by MEMORY.md interests
  paper-digest: { enabled: true, schedule: "0 7 * * *" }

  reddit-digest: { enabled: true, schedule: "0 7 * * *" }
  telegram-digest: { enabled: true, schedule: "30 7 * * *", model: "claude-sonnet-4-6" } # digest from tracked Telegram channels

  # --- Mid-morning (9 AM UTC) --- DISABLED: repo/code cluster cut for cost reduction
  issue-triage: { enabled: false, schedule: "0 9 * * *" }
  pr-review: { enabled: false, schedule: "0 9 * * *", var: "tomscaria/swarm-fund-mvp — review parallel-session PRs against ADRs in DECISIONS.md and the conventions in CLAUDE.md. Block on: untested logic, hardcoded secrets, schema changes without migration, removal of risk gates." }
  auto-merge: { enabled: false, schedule: "0 14 * * *" } # merge green PRs daily at 2 PM UTC; max 3 per run
  github-monitor: { enabled: false, schedule: "0 9 * * *" }
  github-issues: { enabled: false, schedule: "0 9 * * *" }
  github-trending: { enabled: false, schedule: "0 9 * * *" }
  github-releases: { enabled: false, schedule: "30 9 * * *" } # track new releases from watched repos

  # --- Midday (12 PM UTC) ---
  token-alert: { enabled: true, schedule: "0 12 * * *" }
  token-movers: { enabled: true, schedule: "0 12 * * *" }
  on-chain-monitor: { enabled: true, schedule: "0 12 * * *" }
  defi-monitor: { enabled: true, schedule: "0 12 * * *" }
  treasury-info: { enabled: true, schedule: "0 12 * * *" }
  distribute-tokens: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — var: distribution list label
  defi-overview: { enabled: true, schedule: "0 12 * * *" }

  monitor-polymarket: { enabled: true, schedule: "30 12 * * *", model: "claude-sonnet-4-6", var: "Track Revenant builder-attributed markets and high-liquidity political/crypto markets. Watched: will-mexico-win-the-2026-fifa-world-cup-529 (Revenant first order, builder code 0xcddc4ba3...8286f), will-bitcoin-hit-1m-before-gta-vi-872, top 5 active US 2028 election markets. Surface 24h price moves > 5pp, volume spikes > 3x 7-day-average, and narrative shifts." } # monitor specific markets for 24h price moves and volume changes
  monitor-kalshi: { enabled: true, schedule: "0 13 * * *", model: "claude-sonnet-4-6" } # monitor Kalshi prediction markets for 24h price moves and volume
  monitor-runners: { enabled: true, schedule: "0 12 * * *" }
  token-pick: { enabled: true, schedule: "0 12 * * *" }
  token-report: { enabled: true, schedule: "30 12 * * *", model: "claude-sonnet-4-6" } # daily token price/volume from GeckoTerminal
  market-context-refresh: { enabled: true, schedule: "0 13 * * *", model: "claude-sonnet-4-6" } # fetch live crypto macro data, update memory
  narrative-tracker: { enabled: true, schedule: "workflow_dispatch", model: "claude-opus-4-7" } # Opus master skill — runs via morning-brief chain; outputs structured briefs for write-tweet + evening-recap
  polymarket-comments: { enabled: true, schedule: "0 13 * * *", var: "Mine high-volume Polymarket comment threads for narrative-shift signals — info-asymmetry alpha that doesn't show up in CalibrationGap's quantitative scanner. Focus: politics + crypto verticals. Surface user names with track records, recurring claims, citation chains pointing at upcoming catalysts." } # top comments from trending Polymarket markets
  unlock-monitor: { enabled: false, schedule: "0 10 * * 1" } # weekly token unlock/vesting tracker — disabled for cost

  # --- Afternoon (2 PM UTC) ---
  article: { enabled: false, schedule: "0 14 * * *" } # disabled for cost
  technical-explainer: { enabled: false, schedule: "30 14 * * *" } # disabled for cost
  digest: { enabled: false, schedule: "0 14 * * *" } # disabled for cost
  research-brief: { enabled: false, schedule: "0 14 * * *" } # disabled for cost
  deep-research: { enabled: true, schedule: "workflow_dispatch", model: "claude-opus-4-7", var: "" } # on-demand only — Opus for complex synthesis
  last30: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — cross-platform 30-day social research
  paper-pick: { enabled: true, schedule: "workflow_dispatch", model: "claude-opus-4-7", var: "Stanford PhD prep (target: Dec 2026). Focus areas: prediction market calibration, agentic finance, multi-agent reinforcement learning, regime-switching trading, Polymarket microstructure, Becker-style trade-level calibration, Darwinian agent selection, FinCon-style verbal reinforcement. Prefer NeurIPS/ICML/SSRN over hype." } # runs via morning-brief chain only; Opus for PhD-quality analysis
  search-skill: { enabled: false, schedule: "0 14 * * *" } # disabled for cost

  security-digest: { enabled: false, schedule: "0 14 * * *" } # disabled for cost
  idea-capture: { enabled: false, schedule: "0 14 * * *" } # disabled for cost
  deal-flow: { enabled: false, schedule: "0 14 * * 1" } # disabled for cost
  reg-monitor: { enabled: false, schedule: "0 14 * * 3" } # disabled for cost

  # --- Repo intelligence (3 PM UTC) --- DISABLED: repo/code cluster cut for cost reduction
  push-recap: { enabled: false, schedule: "0 15 * * *" }
  repo-article: { enabled: false, schedule: "0 15 * * *" }
  repo-actions: { enabled: false, schedule: "0 15 * * *" }
  repo-pulse: { enabled: false, schedule: "0 15 * * *" }
  star-milestone: { enabled: false, schedule: "15 15 * * *" }
  project-lens: { enabled: false, schedule: "30 15 * * 1,3,5" }
  repo-scanner:
    {
      enabled: false,
      schedule: "0 15 * * 0",
      model: "claude-sonnet-4-6",
      var: ""
    }

  # --- Late afternoon (4 PM UTC) ---
  skill-security-scan: { enabled: false, schedule: "0 16 * * 1" } # disabled for cost
  code-health: { enabled: false, schedule: "0 16 * * *" } # disabled for cost
  changelog: { enabled: false, schedule: "0 16 * * *" } # disabled for cost
  external-feature: { enabled: false, schedule: "30 16 * * *", var: "" } # disabled for cost
  vuln-scanner: { enabled: true, schedule: "0 16 * * 6", var: "" } # Saturday — audit repos for security vulns, PR fixes
  config-audit: { enabled: true, schedule: "0 16 * * 0" } # Sunday — audit CLAUDE.md, aeon.yml, skills, soul for security/PII issues
  deploy-prototype: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — build app and deploy to Vercel
  autoresearch: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — set var to skill name to evolve
  create-skill: { enabled: true, schedule: "workflow_dispatch", var: "" } # one-shot skill creator — set var to a description prompt

  # --- X / social (5 PM UTC) ---
  fetch-tweets: { enabled: true, schedule: "0 17 * * *" }
  refresh-x: { enabled: true, schedule: "0 17 * * *" }
  list-digest: { enabled: true, schedule: "0 17 * * *" }
  write-tweet: { enabled: true, schedule: "0 17 * * *", model: "claude-opus-4-7" } # Opus for narrative-grounded content; consumes narrative-tracker via chain
  reply-maker: { enabled: true, schedule: "0 17 * * *" }
  remix-tweets: { enabled: false, schedule: "30 17 * * *" } # disabled for cost
  tweet-roundup: { enabled: true, schedule: "0 17 * * *", var: "" } # latest tweets on configurable topics
  agent-buzz: { enabled: true, schedule: "workflow_dispatch" } # runs via evening-rollup chain; individual schedule removed to avoid duplication
  farcaster-digest: { enabled: false, schedule: "0 17 * * *" } # disabled for cost
  vibecoding-digest: { enabled: false, schedule: "30 17 * * *" } # disabled for cost
  channel-recap: { enabled: true, schedule: "0 17 * * 0", var: "" } # weekly — recap from Telegram channel (set var to channel username)

  # --- Feed generation (5:30 PM UTC, after content skills) ---
  rss-feed: { enabled: false, schedule: "30 17 * * *" } # disabled for cost

  # --- Gallery update (Sunday 6 PM UTC, after content week) ---
  update-gallery: { enabled: false, schedule: "0 18 * * 0" } # disabled for cost

  # --- Content distribution (runs 30 min after article-generating skills) ---
  syndicate-article:
    {
      enabled: false,
      schedule: "30 15 * * *",
      model: "claude-sonnet-4-6",
      var: ""
    } # disabled for cost

  # --- Evening / meta (6 PM UTC) ---
  goal-tracker: { enabled: true, schedule: "0 18 * * *" } # re-enabled — context pipeline provides real trading data for goal status
  skill-health: { enabled: true, schedule: "0 18 * * *" }

  self-improve: { enabled: false, schedule: "0 18 1/2 * *" } # disabled for cost
  reflect: { enabled: false, schedule: "0 18 * * *" } # disabled for cost

  action-converter: { enabled: false, schedule: "0 18 * * *" } # disabled for cost
  startup-idea: { enabled: false, schedule: "0 18 * * *" } # disabled — replaced by monetize-revenant
  monetize-revenant: { enabled: true, schedule: "0 14 * * 1", model: "claude-sonnet-4-6" } # Monday 2PM UTC — weekly monetization ideas for Revenant infra
  tool-builder: { enabled: true, schedule: "reactive", var: "" } # reactive — build automation scripts from recurring tasks
  skill-repair: { enabled: true, schedule: "reactive", var: "" } # reactive — auto-fix failing skills
  evening-recap: { enabled: true, schedule: "0 21 * * *", model: "claude-sonnet-4-6", var: "End-of-day Telegram digest: trading-loop scan count, signals fired, Revenant order activity, NAV delta, any aeon skill failures, top 3 papers/comments/PRs surfaced today. Keep under 200 words." } # end-of-day ops summary
  vercel-projects:
    {
      enabled: false,
      schedule: "0 18 * * 0",
      model: "claude-sonnet-4-6",
      var: ""
    } # disabled for cost

  # --- Cost tracking (Monday 7 AM UTC, weekly) ---
  cost-report: { enabled: true, schedule: "0 7 * * 1", model: "claude-sonnet-4-6" } # weekly API cost breakdown by skill and model
  session-learner: { enabled: true, schedule: "0 7 * * 1" } # Monday — extract patterns from operator Claude Code sessions

  # --- Weekly (Monday only) ---
  fork-fleet: { enabled: false, schedule: "0 10 * * 1" } # disabled for cost
  skill-evals: { enabled: false, schedule: "0 6 * * 0", model: "claude-sonnet-4-6" } # disabled for cost
  skill-update-check: { enabled: false, schedule: "0 19 * * 0", model: "claude-sonnet-4-6" } # disabled for cost
  spawn-instance: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — var: "name: purpose"
  fleet-control: { enabled: false, schedule: "0 9,15 * * *" } # disabled for cost
  weekly-review: { enabled: false, schedule: "0 19 * * 1" } # disabled for cost
  weekly-shiplog: { enabled: false, schedule: "0 9 * * 1", var: "tomscaria/swarm-fund-mvp — synthesize last week's commits + DECISIONS.md ADR adds + memory updates into an LP-ready narrative. Lead with shipped milestones, lifecycle progress (Birth/Canary/Apex/Revenant counts), trade tape highlights. Suitable for forwarding to investors and grant committees." } # disabled for cost
  skill-leaderboard: { enabled: false, schedule: "0 17 * * 0", model: "claude-sonnet-4-6" } # disabled for cost
  fork-contributor-leaderboard: { enabled: false, schedule: "30 17 * * 0", model: "claude-sonnet-4-6" } # disabled for cost
  fork-skill-digest: { enabled: false, schedule: "30 18 * * 0", model: "claude-sonnet-4-6" } # disabled for cost
  workflow-security-audit: { enabled: true, schedule: "0 16 * * 0" } # Sunday — scan workflows for injection vectors
  skill-graph: { enabled: false, schedule: "0 17 * * 0" } # disabled for cost

  # --- Utilities ---
  task-planner: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — decompose goals into skill chains with cost estimation
  auto-workflow: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — var: URL to analyze
  onboard: { enabled: true, schedule: "workflow_dispatch", var: "" } # one-shot setup validator — checks secrets/workflows/memory writability and notifies a checklist with fix commands; pair with ./onboard CLI

  # --- Fallback (must be last) ---
  heartbeat: { enabled: true, schedule: "0 8,14,20 * * *" }

# Reactive triggers — event-driven skill dispatch based on cron-state.json conditions.
# Skills with schedule: "reactive" are never cron-matched. Instead, the scheduler
# evaluates their trigger rules after processing cron skills.
#
# Format: trigger: { on: <source-skill>, when: "<condition>" }
# Conditions:
#   consecutive_failures >= N    — source skill failed N+ times in a row
#   success_rate < X             — source skill success rate below threshold
#   last_status = success        — source skill just succeeded (for chaining)
#
# Multiple triggers: trigger: [{ on: a, when: "..." }, { on: b, when: "..." }]
# Any matching trigger fires the skill (OR logic).
reactive:
  # skill-repair:
  #   trigger:
  #     - { on: "*", when: "consecutive_failures >= 3" }
  # autoresearch:
  #   trigger:
  #     - { on: skill-health, when: "last_status = success" }

# Chains — multi-step skill pipelines with parallel execution and output passing.
# Steps run sequentially; use parallel: [...] for concurrent execution within a step.
# Skills with consume: [...] receive prior step outputs injected into their context.
#
# Format:
#   chains:
#     chain-name:
#       schedule: "cron expression"
#       on_error: fail-fast          # fail-fast (default) | continue
#       steps:
#         - parallel: [skill-a, skill-b]
#         - skill: skill-c, consume: [skill-a, skill-b]
chains:
  # Morning aggregation: pull all the relevant signals in parallel, then have
  # morning-brief synthesize them into one digest. Beats getting 6 separate
  # notifications.
  morning-brief:
    schedule: "0 7 * * *"
    on_error: continue
    steps:
      - parallel: [paper-pick, hacker-news-digest, monitor-polymarket, monitor-kalshi, narrative-tracker]
      - skill: morning-brief, consume: [paper-pick, hacker-news-digest, monitor-polymarket, monitor-kalshi, narrative-tracker]

  # Evening rollup: pull signals in parallel, narrative-tracker feeds write-tweet,
  # then evening-recap synthesizes everything into a Telegram summary.
  evening-rollup:
    schedule: "0 21 * * *"
    on_error: continue
    steps:
      - parallel: [monitor-polymarket, agent-buzz, narrative-tracker]
      - skill: write-tweet, consume: [narrative-tracker]
      - skill: evening-recap, consume: [monitor-polymarket, agent-buzz, narrative-tracker]

  # Weekly grant-update narrative: DISABLED — depends on push-recap, repo-pulse (cut)
  # weekly-grant-update:
  #   schedule: "0 9 * * 1"
  #   on_error: continue
  #   steps:
  #     - parallel: [paper-pick, repo-pulse, push-recap, narrative-tracker]
  #     - skill: weekly-shiplog, consume: [paper-pick, repo-pulse, push-recap, narrative-tracker]

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5-20251001
# Bankr gateway also supports: gemini-3-pro, gemini-3-flash, gpt-5.2, kimi-k2.5, qwen3-coder
model: claude-sonnet-4-6

# AI Gateway — route Claude Code requests through an LLM gateway.
# provider: direct (default, uses ANTHROPIC_API_KEY) | bankr (uses BANKR_LLM_KEY)
# Bankr docs: https://docs.bankr.bot/llm-gateway/overview
gateway:
  provider: direct

# Output channels
channels:
  jsonrender:
    enabled: true # Set to true (or JSONRENDER_ENABLED=true as repo var) to write json-render specs

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true
