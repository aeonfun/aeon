name: Aeon
run-name: "skill: ${{ inputs.skill || 'feature' }}${{ inputs.var && format(' ({0})', inputs.var) || '' }}"

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill name (must match a directory under skills/)'
        required: true
        type: string
      model:
        description: 'Model'
        required: false
        type: choice
        default: '(config default)'
        options:
          - '(config default)'
          - claude-opus-4-7
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
          - gemini-3-pro
          - gemini-3-flash
          - gpt-5.2
          - kimi-k2.5
          - qwen3-coder
      var:
        description: 'Variable (e.g. AI, bitcoin, owner/repo)'
        required: false
        type: string
      chain_context_file:
        description: 'Path to file with prior chain step outputs (set by chain runner)'
        required: false
        type: string
  workflow_call:
    inputs:
      skill:
        description: 'Skill to run'
        required: true
        type: string
      model:
        description: 'Model override'
        required: false
        type: string
      var:
        description: 'Variable'
        required: false
        type: string
      chain_context_file:
        description: 'Chain context file path'
        required: false
        type: string
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: '--no-deprecation'

concurrency:
  group: aeon-${{ inputs.skill || github.event.action || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name != 'issues' || github.event.label.name == 'ai-build'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Early checkout
        if: github.event_name == 'issues'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Determine skill
        id: skill
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "name=${{ inputs.skill }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "name=feature" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if there's work
        id: work
        run: |
          if [ -n "${{ steps.skill.outputs.name }}" ]; then
            echo "mode=skill" >> "$GITHUB_OUTPUT"
            echo "label=${{ steps.skill.outputs.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "Nothing to do"
          fi

      - name: Checkout repo
        if: steps.work.outputs.mode != ''
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.work.outputs.mode != ''
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"

      - name: Setup Node.js
        if: steps.work.outputs.mode != ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Claude Code
        if: steps.work.outputs.mode != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate skill secrets
        if: steps.work.outputs.mode != ''
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          SUPERNOTES_API_KEY: ${{ secrets.SUPERNOTES_API_KEY }}
        run: |
          SKILL_FILE="skills/${{ steps.skill.outputs.name }}/SKILL.md"
          [ ! -f "$SKILL_FILE" ] && exit 0

          # Extract secret references (VAR_API_KEY, VAR_TOKEN, etc.)
          SECRETS=$(grep -oE '\$\{?[A-Z][A-Z0-9_]{2,}\}?' "$SKILL_FILE" 2>/dev/null | \
            sed 's/[${}]//g' | \
            grep -E '_(API_KEY|KEY|TOKEN|SECRET|WEBHOOK_URL)$' | \
            grep -vE '^(GITHUB_TOKEN|GH_TOKEN|ANTHROPIC_API_KEY|CLAUDE_CODE_OAUTH_TOKEN|BANKR_LLM_KEY|TELEGRAM_|DISCORD_|SLACK_)' | \
            sort -u) || true

          [ -z "$SECRETS" ] && exit 0

          MISSING=() OPTIONAL=()
          while IFS= read -r secret; do
            [ -z "$secret" ] && continue
            if [ -z "${!secret:-}" ]; then
              if grep -qiE "(if.*${secret}.*is (not )?set|${secret}.*(optional|falls? back)|without)" "$SKILL_FILE" 2>/dev/null; then
                OPTIONAL+=("$secret")
              else
                MISSING+=("$secret")
              fi
            fi
          done <<< "$SECRETS"

          [ ${#OPTIONAL[@]} -gt 0 ] && echo "::notice::Optional secrets not set: ${OPTIONAL[*]} (skill will use fallbacks)"
          [ ${#MISSING[@]} -gt 0 ] && echo "::warning::Secrets not set: ${MISSING[*]} — skill may fail or produce incomplete results"
          exit 0

      - name: Run pre-fetch scripts
        if: steps.work.outputs.mode != ''
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          SKILL_VAR: ${{ inputs.var }}
        run: |
          # Run all scripts/prefetch-*.sh before Claude starts (outside sandbox).
          # Each script receives the skill name and var as arguments.
          # Scripts should check their own env vars and exit 0 if not configured.
          # SKILL_VAR comes through env (not template interpolation) so embedded
          # $TOKEN / $VAR references in the user input aren't eaten by bash.
          SKILL="${{ steps.skill.outputs.name }}"
          VAR="$SKILL_VAR"
          for script in scripts/prefetch-*.sh; do
            [ -f "$script" ] || continue
            chmod +x "$script"
            echo "Running $(basename "$script")..."
            ./"$script" "$SKILL" "$VAR" || echo "::notice::$(basename "$script") skipped or failed (non-fatal)"
          done

      - name: Run
        id: run
        if: steps.work.outputs.mode != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MAP: ${{ secrets.DISCORD_WEBHOOK_MAP }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ vars.NOTIFY_EMAIL_FROM || 'aeon@notifications.aeon.bot' }}
          NOTIFY_EMAIL_SUBJECT_PREFIX: ${{ vars.NOTIFY_EMAIL_SUBJECT_PREFIX || '[Aeon]' }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BANKR_API_KEY: ${{ secrets.BANKR_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          JSONRENDER_ENABLED: ${{ vars.JSONRENDER_ENABLED || 'true' }}
          SKILL_VAR: ${{ inputs.var }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          SKILL_NAME="${{ steps.skill.outputs.name }}"
          export SKILL_NAME
          CONFIG_MODEL=$(grep -E '^model:' aeon.yml | sed 's/^model: *//' | tr -d ' ')
          # Check for per-skill model override in aeon.yml (extract quoted value, ignore comments)
          SKILL_MODEL=$(grep "^  ${SKILL_NAME}:" aeon.yml | sed -n 's/.*model: *"\([^"]*\)".*/\1/p')
          INPUT_MODEL="${{ inputs.model }}"
          if [ -n "$INPUT_MODEL" ] && [ "$INPUT_MODEL" != "(config default)" ]; then
            MODEL="$INPUT_MODEL"
          elif [ -n "$SKILL_MODEL" ]; then
            MODEL="$SKILL_MODEL"
          else
            MODEL="${CONFIG_MODEL:-claude-opus-4-7}"
          fi
          echo "Using model: $MODEL"
          echo "SKILL_MODEL=$MODEL" >> "$GITHUB_OUTPUT"

          # --- AI Gateway routing ---
          GATEWAY=$(grep -A1 '^gateway:' aeon.yml | grep 'provider:' | sed 's/.*provider: *//' | tr -d ' "'"'" || echo "direct")
          GATEWAY="${GATEWAY:-direct}"
          echo "Gateway: $GATEWAY"

          echo "GATEWAY=$GATEWAY" >> "$GITHUB_OUTPUT"

          if [ "$GATEWAY" = "bankr" ]; then
            if [ -z "${BANKR_LLM_KEY:-}" ]; then
              echo "::error::gateway.provider=bankr but BANKR_LLM_KEY secret is not set"
              exit 1
            fi
            export ANTHROPIC_BASE_URL="https://llm.bankr.bot"
            export ANTHROPIC_AUTH_TOKEN="$BANKR_LLM_KEY"
            unset ANTHROPIC_API_KEY
            unset CLAUDE_CODE_OAUTH_TOKEN
            echo "::notice::Routing through Bankr Gateway (https://llm.bankr.bot)"
          else
            echo "::notice::Using direct Anthropic API"
          fi

          # Generate notify script in workspace (Claude calls: ./notify "message")
          # Messages are saved to .pending-notify/ for reliable post-run delivery
          # (sandbox may block outbound curl during Claude's run)
          # Pre-create .pending-notify/ so the sandbox doesn't block Claude's first write into it
          mkdir -p .pending-notify
          : > .notify-sent-hashes

          cat > ./notify << 'NOTIFY_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          # --signal flag: suppress Telegram delivery (Discord-only routing for signal-output skills).
          # Usage:
          #   ./notify "message"            — default: Telegram + Discord + Slack + email
          #   ./notify --signal "message"   — Discord + Slack + email only (skip Telegram)
          SIGNAL=false
          if [ "${1:-}" = "--signal" ]; then SIGNAL=true; shift; fi
          MSG="${1:-}"

          # Reject flag-like arguments as MSG. If Claude calls `./notify --help`
          # or `./notify --skill foo` the script previously treated `--help` or
          # `--skill` as the payload, wrote that to .pending-notify/ AND to
          # dashboard/outputs/.pending-${SKILL_NAME}.md (json-render path), and
          # the Capture step then overwrote the real artifact with the flag
          # string. ISS-006 hit twice on consecutive days under this pattern
          # (`--help` on 2026-05-19, `--skill` on 2026-05-20). Detect and bail.
          case "$MSG" in
            --*)
              echo "notify: refusing flag-like MSG argument: '$MSG'. Expected message text after --signal (if present). Exiting non-zero so misuse is visible." >&2
              exit 2
              ;;
          esac

          # Suppress obvious diagnostic probes (short messages containing test/trace/ping/debug/hello).
          # Claude sometimes issues these to verify the notify script works — they should not reach channels.
          MSG_LEN=${#MSG}
          if [ "$MSG_LEN" -lt 120 ]; then
            MSG_LOWER=$(printf '%s' "$MSG" | tr '[:upper:]' '[:lower:]')
            case "$MSG_LOWER" in
              *test*|*trace*|*ping*|*debug*|hello|hi)
                echo "notify: suppressing trace/test message ($MSG_LEN chars): $MSG" >&2
                exit 0
                ;;
            esac
          fi

          # Dedup within this workflow run — same message never sent twice even if ./notify is called again.
          # Uses .notify-attempted-hashes (in-run attempt tracking) separately from .notify-sent-hashes
          # (cross-step delivery tracking, written only on successful delivery). If inline delivery
          # fails (sandbox-blocked curl, transient 5xx), .notify-sent-hashes stays empty for this
          # message, so the post-run "Send pending notifications" step still retries.
          HASH=$(printf '%s' "$MSG" | sha256sum | awk '{print $1}')
          ATTEMPTED_FILE=".notify-attempted-hashes"
          SENT_FILE=".notify-sent-hashes"
          touch "$ATTEMPTED_FILE" 2>/dev/null || true
          if [ -f "$ATTEMPTED_FILE" ] && grep -qxF "$HASH" "$ATTEMPTED_FILE" 2>/dev/null; then
            echo "notify: duplicate message (hash ${HASH:0:8}), skipping" >&2
            exit 0
          fi
          printf '%s\n' "$HASH" >> "$ATTEMPTED_FILE" 2>/dev/null || true

          # Always save to .pending-notify/ for post-run delivery (sandbox fallback).
          # Filename convention encodes the --signal flag so post-run re-delivery honors Telegram suppression.
          TS=$(date -u +%s)
          if [ "$SIGNAL" = "true" ]; then
            PENDING_FILE=".pending-notify/${TS}.signal.md"
          else
            PENDING_FILE=".pending-notify/${TS}.md"
          fi
          echo "$MSG" > "$PENDING_FILE"

          # Attempt immediate delivery (may fail in sandbox — post-run step retries)
          DELIVERED=false

          # Telegram: 4096-char limit, strict Markdown parsing. Chunk on
          # paragraph (\n\n) then line (\n) then hard-split. Chunks come back
          # one per line, base64-encoded to preserve embedded newlines.
          # Skipped entirely when --signal flag was passed (signal skills route to Discord only).
          if [ "$SIGNAL" != "true" ] && [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            TG_CHUNKS_B64=$(printf '%s' "$MSG" | python3 .github/scripts/chunk-text.py 3900)
            while IFS= read -r TG_CHUNK_B64; do
              [ -z "$TG_CHUNK_B64" ] && continue
              TG_MSG=$(printf '%s' "$TG_CHUNK_B64" | base64 -d)
              TG_RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$TG_MSG" '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')" 2>/dev/null) || true
              TG_HTTP=$(echo "$TG_RESULT" | tail -1)
              TG_OK=$(echo "$TG_RESULT" | sed '$d' | jq -r '.ok // false' 2>/dev/null || echo "false")
              if [ "$TG_HTTP" = "200" ] && [ "$TG_OK" = "true" ]; then
                DELIVERED=true
              else
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$TG_MSG" '{chat_id: $chat, text: $text}')" > /dev/null 2>&1 && DELIVERED=true || true
              fi
              # Preserve chunk ordering in the Telegram channel
              sleep 0.3
            done <<< "$TG_CHUNKS_B64"
          fi

          # Discord: per-skill routing via DISCORD_WEBHOOK_MAP (JSON), fallback to DISCORD_WEBHOOK_URL.
          # Discord webhook `content` field is hard-capped at 2000 chars — messages over
          # that are rejected with a silent HTTP 400 by curl -sf. Chunk on the same
          # paragraph/line boundaries Telegram uses, 1900-char limit to leave room
          # for the [i/N] suffix the chunker appends.
          DISCORD_TARGET=""
          if [ -n "${DISCORD_WEBHOOK_MAP:-}" ]; then
            DISCORD_TARGET=$(printf '%s' "$DISCORD_WEBHOOK_MAP" | jq -r --arg s "${SKILL_NAME:-}" '.[$s] // ._default // empty' 2>/dev/null || echo "")
          fi
          if [ -z "$DISCORD_TARGET" ]; then
            DISCORD_TARGET="${DISCORD_WEBHOOK_URL:-}"
          fi
          if [ -n "$DISCORD_TARGET" ]; then
            DC_CHUNKS_B64=$(printf '%s' "$MSG" | python3 .github/scripts/chunk-text.py 1900)
            DC_ANY_OK=false
            while IFS= read -r DC_CHUNK_B64; do
              [ -z "$DC_CHUNK_B64" ] && continue
              DC_MSG=$(printf '%s' "$DC_CHUNK_B64" | base64 -d)
              DC_HTTP=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$DISCORD_TARGET" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg text "$DC_MSG" '{content: $text}')" 2>/dev/null || echo "000")
              if [ "$DC_HTTP" = "200" ] || [ "$DC_HTTP" = "204" ]; then
                DC_ANY_OK=true
              else
                echo "notify: Discord webhook returned HTTP $DC_HTTP for chunk ($(printf '%s' "$DC_MSG" | wc -c | tr -d ' ') chars)" >&2
              fi
              # Discord rate limit: 5 requests / 2 seconds per channel
              sleep 0.5
            done <<< "$DC_CHUNKS_B64"
            [ "$DC_ANY_OK" = "true" ] && DELIVERED=true
          fi
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{text: $text}')" > /dev/null && DELIVERED=true || true
          fi
          # Email via SendGrid
          if [ -n "${SENDGRID_API_KEY:-}" ] && [ -n "${NOTIFY_EMAIL_TO:-}" ]; then
            FROM="${NOTIFY_EMAIL_FROM:-aeon@notifications.aeon.bot}"
            PREFIX="${NOTIFY_EMAIL_SUBJECT_PREFIX:-[Aeon]}"
            SUBJECT="$PREFIX ${SKILL_NAME:-notification}"
            HTML_BODY=$(printf '%s' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            HTML_BODY="<html><body><pre style=\"font-family:monospace;white-space:pre-wrap;\">${HTML_BODY}</pre></body></html>"
            curl -sf -X POST "https://api.sendgrid.com/v3/mail/send" \
              -H "Authorization: Bearer ${SENDGRID_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg from "$FROM" \
                --arg to "$NOTIFY_EMAIL_TO" \
                --arg subject "$SUBJECT" \
                --arg html "$HTML_BODY" \
                --arg text "$MSG" \
                '{personalizations:[{to:[{email:$to}]}],from:{email:$from},subject:$subject,content:[{type:"text/plain",value:$text},{type:"text/html",value:$html}]}')" > /dev/null 2>&1 || true
          fi
          # json-render channel — save raw message for post-run conversion
          if [ "${JSONRENDER_ENABLED:-false}" = "true" ] && [ -n "${SKILL_NAME:-}" ]; then
            mkdir -p dashboard/outputs
            echo "$MSG" > "dashboard/outputs/.pending-${SKILL_NAME}.md"
          fi

          # Remove pending file if immediate delivery succeeded (prevents double-send),
          # and record the hash in .notify-sent-hashes so post-run delivery sees it as done.
          # If delivery failed, leave the pending file in place AND leave .notify-sent-hashes
          # untouched — post-run will retry and record the hash on its own success.
          if [ "$DELIVERED" = "true" ]; then
            rm -f "$PENDING_FILE"
            touch "$SENT_FILE" 2>/dev/null || true
            printf '%s\n' "$HASH" >> "$SENT_FILE" 2>/dev/null || true
          fi
          NOTIFY_SCRIPT
          chmod +x ./notify

          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(./notify:*),Bash(./notify-jsonrender:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
          ALLOWED="$ALLOWED,Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(grep:*)"

          SKILL_NAME="${{ steps.skill.outputs.name }}"
          VAR="$SKILL_VAR"

          # Build prompt — inject chain context if running as part of a chain
          CHAIN_CTX="${{ inputs.chain_context_file }}"
          if [ -n "$CHAIN_CTX" ] && [ -f "$CHAIN_CTX" ]; then
            CONTEXT=$(cat "$CHAIN_CTX")
            PROMPT="Today is $TODAY.

          ## Context from prior chain steps
          $CONTEXT

          Read and execute the skill defined in skills/${SKILL_NAME}/SKILL.md
          Use the chain context above instead of re-running those skills. Synthesize and build on their outputs."
          else
            PROMPT="Today is $TODAY. Read and execute the skill defined in skills/${SKILL_NAME}/SKILL.md"
          fi
          if [ -n "$VAR" ]; then
            PROMPT="$PROMPT

          Use this variable (override the default in the skill file):
          var=$VAR"
          fi
          # Sentinel timestamp — anything in .outputs/ modified after this point
          # was written by Claude during this run. Read by the "Capture skill
          # output" step to distinguish a freshly-written locked artifact from
          # a stale file checked out from the prior commit.
          touch /tmp/aeon-claude-start
          if ! CLAUDE_OUTPUT=$(echo "$PROMPT" | claude -p - \
            --model "$MODEL" --allowedTools "$ALLOWED" \
            --output-format json 2>&1); then
            echo "::error::Claude CLI failed. Output: $CLAUDE_OUTPUT"
            # Save error signature for quality tracking (cron-state step reads this)
            echo "$CLAUDE_OUTPUT" | tail -c 500 | tr '\n' ' ' | cut -c1-200 > /tmp/skill-error.txt
            exit 1
          fi

          # Extract and print the text result so logs still show skill output
          RESULT_TEXT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')
          echo "$RESULT_TEXT"
          # Save result for output capture step
          echo "$RESULT_TEXT" > /tmp/skill-result.txt

          # Parse token usage from JSON response
          INPUT_TOKENS=$(echo "$CLAUDE_OUTPUT" | jq '.usage.input_tokens // 0')
          OUTPUT_TOKENS=$(echo "$CLAUDE_OUTPUT" | jq '.usage.output_tokens // 0')
          CACHE_READ=$(echo "$CLAUDE_OUTPUT" | jq '.usage.cache_read_input_tokens // 0')
          CACHE_CREATION=$(echo "$CLAUDE_OUTPUT" | jq '.usage.cache_creation_input_tokens // 0')
          TOTAL_TOKENS=$((INPUT_TOKENS + OUTPUT_TOKENS))

          echo "SKILL_INPUT_TOKENS=$INPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "SKILL_OUTPUT_TOKENS=$OUTPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "SKILL_CACHE_READ_TOKENS=$CACHE_READ" >> "$GITHUB_OUTPUT"
          echo "SKILL_CACHE_CREATION_TOKENS=$CACHE_CREATION" >> "$GITHUB_OUTPUT"
          echo "SKILL_TOTAL_TOKENS=$TOTAL_TOKENS" >> "$GITHUB_OUTPUT"

          echo "::notice::Token usage — input: $INPUT_TOKENS, output: $OUTPUT_TOKENS, cache_read: $CACHE_READ, cache_creation: $CACHE_CREATION, total: $TOTAL_TOKENS"

      - name: Log token usage
        if: steps.work.outputs.mode != ''
        run: |
          SKILL="${{ steps.skill.outputs.name }}"
          INPUT="${{ steps.run.outputs.SKILL_INPUT_TOKENS }}"
          OUTPUT="${{ steps.run.outputs.SKILL_OUTPUT_TOKENS }}"
          CACHE_READ="${{ steps.run.outputs.SKILL_CACHE_READ_TOKENS }}"
          CACHE_CREATION="${{ steps.run.outputs.SKILL_CACHE_CREATION_TOKENS }}"
          TOTAL="${{ steps.run.outputs.SKILL_TOTAL_TOKENS }}"
          echo "## Token Usage: $SKILL" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Tokens |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | $INPUT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | $OUTPUT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache read | $CACHE_READ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache creation | $CACHE_CREATION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Track token costs
        if: steps.work.outputs.mode != '' && steps.run.outcome == 'success'
        run: |
          CSV="memory/token-usage.csv"
          mkdir -p memory
          if [ ! -f "$CSV" ]; then
            echo "date,skill,model,input_tokens,output_tokens,cache_read,cache_creation" > "$CSV"
          fi
          echo "$(date -u +%Y-%m-%d),${{ steps.skill.outputs.name }},${{ steps.run.outputs.SKILL_MODEL }},${{ steps.run.outputs.SKILL_INPUT_TOKENS }},${{ steps.run.outputs.SKILL_OUTPUT_TOKENS }},${{ steps.run.outputs.SKILL_CACHE_READ_TOKENS }},${{ steps.run.outputs.SKILL_CACHE_CREATION_TOKENS }}" >> "$CSV"

      - name: Capture skill output
        if: steps.work.outputs.mode != '' && steps.run.outcome == 'success'
        run: |
          SKILL="${{ steps.skill.outputs.name }}"
          mkdir -p .outputs
          ARTIFACT=".outputs/${SKILL}.md"
          PENDING="dashboard/outputs/.pending-${SKILL}.md"
          # Resolve the artifact in priority order:
          #   1. Skill-written locked-format artifact (fresh — modified after
          #      /tmp/aeon-claude-start sentinel touched just before Claude ran).
          #      Authoritative when present.
          #   2. json-render pending file (when JSONRENDER_ENABLED=true and the
          #      skill did NOT write its own artifact). Only signal-only skills
          #      that route entirely through ./notify rely on this.
          #   3. Fall back to Claude's chat result (which per CLAUDE.md
          #      convention ends in a `## Summary` block — only use this when
          #      neither (1) nor (2) is available).
          #   4. Empty-output placeholder.
          #
          # History: the first version unconditionally jumped to (3), which
          # OVERWROTE every skill's Write-tool-created locked artifact with
          # the chat response — root cause of ISS-003/004/005. PR #27 added
          # the sentinel-mtime preservation but kept (2) ahead of (1), so a
          # bad json-render pending file (e.g. when `./notify --skill` left
          # the literal string `--skill` in MSG) STILL won over the correct
          # skill-written artifact — ISS-006 recurrence on 2026-05-20. This
          # version puts (1) first; (2) only fires when the skill did not
          # write its own fresh artifact.
          if [ -f "$ARTIFACT" ] && [ -s "$ARTIFACT" ] && [ "$ARTIFACT" -nt /tmp/aeon-claude-start ]; then
            echo "Capture: skill wrote its own $ARTIFACT ($(wc -c < "$ARTIFACT") bytes), preserving"
          elif [ -f "$PENDING" ]; then
            cp "$PENDING" "$ARTIFACT"
            echo "Capture: skill did not write its own artifact; using json-render pending file"
          elif [ -f /tmp/skill-result.txt ] && [ -s /tmp/skill-result.txt ]; then
            cp /tmp/skill-result.txt "$ARTIFACT"
            echo "Capture: skill did not write its own artifact; falling back to Claude chat result"
          else
            echo "_No output captured._" > "$ARTIFACT"
            echo "Capture: no skill artifact and no Claude result; wrote empty-output placeholder"
          fi
          echo "::notice::Skill output captured to $ARTIFACT ($(wc -c < "$ARTIFACT") bytes)"

      - name: Analyze skill output
        id: analyze
        if: steps.work.outputs.mode != '' && steps.run.outcome == 'success'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
        run: |
          SKILL="${{ steps.skill.outputs.name }}"

          # Skip analysis for meta skills (they don't produce scorable output)
          case "$SKILL" in heartbeat|skill-health|skill-analytics|reflect|memory-flush|self-review|cost-report) echo "Skipping analysis for meta skill"; exit 0;; esac

          # Route through gateway if configured
          if [ "${{ steps.run.outputs.GATEWAY }}" = "bankr" ] && [ -n "${BANKR_LLM_KEY:-}" ]; then
            export ANTHROPIC_BASE_URL="https://llm.bankr.bot"
            export ANTHROPIC_AUTH_TOKEN="$BANKR_LLM_KEY"
            unset ANTHROPIC_API_KEY
            unset CLAUDE_CODE_OAUTH_TOKEN
          fi

          # Read and truncate skill output for analysis
          OUTPUT=""
          if [ -f /tmp/skill-result.txt ] && [ -s /tmp/skill-result.txt ]; then
            OUTPUT=$(head -c 3000 /tmp/skill-result.txt)
          fi
          [ -z "$OUTPUT" ] && { echo "No output to analyze"; exit 0; }

          ANALYSIS_PROMPT="Score this autonomous agent skill output on a 1-5 scale. Respond with ONLY valid JSON.

          Scoring:
          1 = Failed/empty/error output
          2 = Ran but low quality, generic, or boilerplate
          3 = Acceptable — completed the task adequately
          4 = Good — substantive, well-structured, useful
          5 = Excellent — insightful, well-sourced, actionable

          Flag any issues from: api_error, empty_output, low_quality, stale_data, generic_content, rate_limited

          Skill: $SKILL
          Output (truncated):
          $OUTPUT

          JSON format: {\"score\": N, \"assessment\": \"one line\", \"flags\": []}"

          if ! RAW=$(echo "$ANALYSIS_PROMPT" | claude -p - \
            --model claude-haiku-4-5-20251001 --output-format json 2>&1); then
            echo "::warning::Skill analysis failed (non-fatal)"
            exit 0
          fi

          ANALYSIS_TEXT=$(echo "$RAW" | jq -r '.result // empty')
          [ -z "$ANALYSIS_TEXT" ] && { echo "::warning::Empty analysis result"; exit 0; }

          # Parse score from response. Try in order:
          #   1. Response is already valid JSON
          #   2. Strip markdown code fences (```json ... ```) and try again
          #   3. Extract first balanced JSON object via Python (handles multi-line + nesting)
          PARSED=""
          if echo "$ANALYSIS_TEXT" | jq empty 2>/dev/null; then
            PARSED="$ANALYSIS_TEXT"
          else
            STRIPPED=$(printf '%s' "$ANALYSIS_TEXT" | sed -E 's/^[[:space:]]*```[a-zA-Z]*[[:space:]]*$//; s/^[[:space:]]*```[[:space:]]*$//' | sed -E '/^[[:space:]]*$/d')
            if echo "$STRIPPED" | jq empty 2>/dev/null; then
              PARSED="$STRIPPED"
            else
              PARSED=$(printf '%s' "$ANALYSIS_TEXT" | python3 .github/scripts/extract-first-json.py 2>/dev/null || true)
            fi
          fi
          if [ -z "$PARSED" ] || ! echo "$PARSED" | jq empty 2>/dev/null; then
            echo "::warning::Could not parse analysis JSON"
            exit 0
          fi

          SCORE=$(echo "$PARSED" | jq -r '.score // 0')
          ASSESSMENT=$(echo "$PARSED" | jq -r '.assessment // "analysis incomplete"')
          FLAGS=$(echo "$PARSED" | jq -c '.flags // []')

          # Validate score range
          if [ "$SCORE" -lt 1 ] || [ "$SCORE" -gt 5 ] 2>/dev/null; then
            SCORE=0
          fi

          echo "QUALITY_SCORE=$SCORE" >> "$GITHUB_OUTPUT"

          # Write skill health file with rolling history
          mkdir -p memory/skill-health
          HEALTH_FILE="memory/skill-health/${SKILL}.json"
          NOW_ISO=$(date -u +%FT%TZ)
          TODAY=$(date -u +%Y-%m-%d)

          if [ -f "$HEALTH_FILE" ] && jq empty "$HEALTH_FILE" 2>/dev/null; then
            HISTORY=$(jq -c '.history // []' "$HEALTH_FILE")
          else
            HISTORY='[]'
          fi

          # Append to history (keep last 30 entries)
          HISTORY=$(echo "$HISTORY" | jq -c --arg d "$TODAY" --argjson s "$SCORE" \
            '. + [{"date": $d, "score": $s}] | .[-30:]')

          AVG=$(echo "$HISTORY" | jq '([.[].score] | add / length * 100 | round) / 100')

          jq -n --arg sk "$SKILL" --arg ts "$NOW_ISO" --argjson sc "$SCORE" \
            --arg as "$ASSESSMENT" --argjson fl "$FLAGS" \
            --argjson hi "$HISTORY" --argjson avg "$AVG" \
            '{skill: $sk, last_analyzed: $ts, quality_score: $sc, assessment: $as, flags: $fl, avg_score: $avg, history: $hi}' \
            > "$HEALTH_FILE"

          echo "::notice::Skill quality — $SKILL: score=$SCORE, avg=$AVG — $ASSESSMENT"

      - name: Convert feed outputs
        if: steps.work.outputs.mode != '' && vars.JSONRENDER_ENABLED != 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
        run: |
          if [ "${{ steps.run.outputs.GATEWAY }}" = "bankr" ] && [ -n "${BANKR_LLM_KEY:-}" ]; then
            export ANTHROPIC_BASE_URL="https://llm.bankr.bot"
            export ANTHROPIC_AUTH_TOKEN="$BANKR_LLM_KEY"
            unset ANTHROPIC_API_KEY
            unset CLAUDE_CODE_OAUTH_TOKEN
          fi
          for pending in dashboard/outputs/.pending-*.md; do
            [ -f "$pending" ] || continue
            SKILL=$(basename "$pending" .md | sed 's/^\.pending-//')
            echo "json-render: converting $SKILL..."
            ./notify-jsonrender "$SKILL" "$(cat "$pending")" && rm -f "$pending" || echo "json-render: $SKILL conversion failed (non-fatal)"
          done

      # IMPORTANT: post-process runs BEFORE Send pending notifications.
      # Reason: some postprocess scripts (e.g. scripts/postprocess-perps-brief.sh)
      # render a markdown artifact from a JSON intermediate and then queue the
      # rendered content to .pending-notify/ via ./notify. The post-run delivery
      # loop must run AFTER postprocess so those queued messages get delivered.
      - name: Run post-process scripts
        if: steps.work.outputs.mode != '' && steps.run.outcome == 'success'
        env:
          # SKILL_NAME is required by postprocess-perps-brief.sh's
          # skill-name guard (introduced to stop cross-channel content
          # leakage when postprocess-*.sh runs in unrelated skill
          # workflows). Without this export, the guard sees SKILL_NAME=''
          # and incorrectly skips the perps-brief workflow's own
          # postprocess, leaving no rendered artifact and no Discord
          # delivery for the brief.
          SKILL_NAME: ${{ steps.skill.outputs.name }}
          # V1_LOCK_DATE filters outcome-tracker's closed[] window to
          # entries with closed_date >= V1_LOCK_DATE. Implements the
          # operator's partial-reset baseline — pre-V1 closes stay in
          # the ledger but don't contaminate the V1 track-record
          # analysis. Unset means "include everything" (cold-start).
          V1_LOCK_DATE: ${{ secrets.V1_LOCK_DATE }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          # V2 Discord bot — parallel embed delivery for perps-brief.
          # postprocess-perps-brief.sh skips bot delivery when these are
          # all unset (no-op for other skill workflows). Setting
          # DISCORD_BOT_DRY_RUN=1 in repo variables prints embed JSON to
          # workflow logs instead of POSTing — use during initial soak.
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_BOT_DRY_RUN: ${{ vars.DISCORD_BOT_DRY_RUN }}
          DISCORD_BOT_CHANNEL_PERPS_CONTEXT: ${{ secrets.DISCORD_BOT_CHANNEL_PERPS_CONTEXT }}
          DISCORD_BOT_CHANNEL_PERPS_POSITIONS: ${{ secrets.DISCORD_BOT_CHANNEL_PERPS_POSITIONS }}
          DISCORD_BOT_CHANNEL_PERPS_SIGNALS: ${{ secrets.DISCORD_BOT_CHANNEL_PERPS_SIGNALS }}
          DISCORD_BOT_CHANNEL_PERPS_WATCHLIST: ${{ secrets.DISCORD_BOT_CHANNEL_PERPS_WATCHLIST }}
          DISCORD_BOT_CHANNEL_PERPS_OUTCOMES: ${{ secrets.DISCORD_BOT_CHANNEL_PERPS_OUTCOMES }}
        run: |
          # Run all scripts/postprocess-*.sh after Claude finishes.
          # Each script handles its own .pending-{service}/ directory
          # and checks its own env vars. Exit 0 if nothing to do.
          for script in scripts/postprocess-*.sh; do
            [ -f "$script" ] || continue
            chmod +x "$script"
            echo "Running $(basename "$script")..."
            ./"$script" || echo "::notice::$(basename "$script") failed (non-fatal)"
          done

      - name: Send pending notifications
        if: steps.work.outputs.mode != '' && steps.run.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_MAP: ${{ secrets.DISCORD_WEBHOOK_MAP }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ vars.NOTIFY_EMAIL_FROM || 'aeon@notifications.aeon.bot' }}
          NOTIFY_EMAIL_SUBJECT_PREFIX: ${{ vars.NOTIFY_EMAIL_SUBJECT_PREFIX || '[Aeon]' }}
          SKILL_NAME: ${{ steps.skill.outputs.name }}
        run: |
          # Re-deliver any .pending-notify/ messages that failed during sandbox.
          # Skip messages whose hash was already sent by ./notify inline,
          # and skip short test/trace probes that shouldn't reach channels.
          if [ ! -d .pending-notify ] || [ -z "$(ls -A .pending-notify/*.md 2>/dev/null)" ]; then
            echo "No pending notifications"
            exit 0
          fi
          HASH_FILE=".notify-sent-hashes"
          touch "$HASH_FILE"
          for pending in .pending-notify/*.md; do
            [ -f "$pending" ] || continue
            MSG=$(cat "$pending")

            # Detect --signal pending files (filename convention: ${TS}.signal.md).
            # Signal-tagged messages skip Telegram delivery; all other channels still fire.
            case "$(basename "$pending")" in
              *.signal.md) SIGNAL=true ;;
              *) SIGNAL=false ;;
            esac

            # Suppress trivial probes
            MSG_LEN=${#MSG}
            if [ "$MSG_LEN" -lt 120 ]; then
              MSG_LOWER=$(printf '%s' "$MSG" | tr '[:upper:]' '[:lower:]')
              case "$MSG_LOWER" in
                *test*|*trace*|*ping*|*debug*|hello|hi)
                  echo "Skipping pending trace/test message: $MSG"
                  continue
                  ;;
              esac
            fi

            # Dedup against messages already sent by ./notify inline
            HASH=$(printf '%s' "$MSG" | sha256sum | awk '{print $1}')
            if grep -qxF "$HASH" "$HASH_FILE" 2>/dev/null; then
              echo "Skipping pending duplicate (${HASH:0:8}): $(basename "$pending")"
              continue
            fi
            printf '%s\n' "$HASH" >> "$HASH_FILE"

            echo "Delivering pending notification: $(basename "$pending")"
            # Telegram (skipped for --signal pending files — Discord-only routing).
            # Chunk via the shared chunker — Telegram hard-rejects > 4096 chars per message.
            if [ "$SIGNAL" != "true" ] && [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              TG_CHUNKS_B64=$(printf '%s' "$MSG" | python3 .github/scripts/chunk-text.py 3900)
              while IFS= read -r TG_CHUNK_B64; do
                [ -z "$TG_CHUNK_B64" ] && continue
                TG_MSG=$(printf '%s' "$TG_CHUNK_B64" | base64 -d)
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$TG_MSG" '{chat_id: $chat, text: $text}')" > /dev/null 2>&1 || true
                sleep 0.3
              done <<< "$TG_CHUNKS_B64"
            fi
            # Discord: per-skill routing via DISCORD_WEBHOOK_MAP (JSON), fallback to DISCORD_WEBHOOK_URL.
            # Discord webhook content field is hard-capped at 2000 chars. Chunk on the same boundaries.
            DC_TARGET=""
            if [ -n "${DISCORD_WEBHOOK_MAP:-}" ]; then
              DC_TARGET=$(printf '%s' "$DISCORD_WEBHOOK_MAP" | jq -r --arg s "${SKILL_NAME:-}" '.[$s] // ._default // empty' 2>/dev/null || echo "")
            fi
            if [ -z "$DC_TARGET" ]; then
              DC_TARGET="${DISCORD_WEBHOOK_URL:-}"
            fi
            if [ -n "$DC_TARGET" ]; then
              DC_CHUNKS_B64=$(printf '%s' "$MSG" | python3 .github/scripts/chunk-text.py 1900)
              while IFS= read -r DC_CHUNK_B64; do
                [ -z "$DC_CHUNK_B64" ] && continue
                DC_MSG=$(printf '%s' "$DC_CHUNK_B64" | base64 -d)
                DC_HTTP=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$DC_TARGET" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg text "$DC_MSG" '{content: $text}')" 2>/dev/null || echo "000")
                if [ "$DC_HTTP" != "200" ] && [ "$DC_HTTP" != "204" ]; then
                  echo "post-run notify: Discord webhook returned HTTP $DC_HTTP for chunk ($(printf '%s' "$DC_MSG" | wc -c | tr -d ' ') chars)"
                fi
                sleep 0.5
              done <<< "$DC_CHUNKS_B64"
            fi
            # Slack
            if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
              curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg text "$MSG" '{text: $text}')" > /dev/null 2>&1 || true
            fi
          done
          rm -rf .pending-notify

      - name: Commit results
        if: steps.work.outputs.mode != ''
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"
          rm -f ./notify .notify-sent-hashes  # Remove generated notify script + dedup log before committing

          CURRENT_BRANCH=$(git branch --show-current)
          LABEL="${{ steps.work.outputs.label }}"

          # If Claude created a feature branch, push it then switch back to main
          if [ "$CURRENT_BRANCH" != "main" ] && [ -n "$CURRENT_BRANCH" ]; then
            echo "On feature branch: $CURRENT_BRANCH"
            git add -A
            git diff --staged --quiet || git commit -m "chore($LABEL): auto-commit $(date +%Y-%m-%d)"
            git push --force-with-lease -u origin "$CURRENT_BRANCH" || true

            # Switch back to main and cherry-pick memory/log changes if any
            git checkout main
            git pull --rebase origin main || true
          fi

          # Commit any remaining changes on main
          git add -A
          if git diff --staged --quiet; then
            # Nothing new to commit — but Claude may have committed during its run.
            # Check for unpushed commits and push them if any exist.
            if [ "$(git rev-list origin/main..HEAD --count 2>/dev/null)" = "0" ]; then
              echo "No changes to commit or push"
              exit 0
            fi
            echo "No new changes, but found unpushed commits — pushing"
          else
            git commit -m "chore($LABEL): auto-commit $(date +%Y-%m-%d)"
          fi
          for i in 1 2 3 4 5; do
            # Pull and rebase onto latest remote
            if ! git pull --rebase origin main 2>/dev/null; then
              echo "Rebase conflict on attempt $i, auto-resolving..."
              while true; do
                CONFLICTED=$(git diff --name-only --diff-filter=U) || true
                [ -z "$CONFLICTED" ] && break
                for f in $CONFLICTED; do
                  if [[ "$f" == memory/logs/* ]] || [[ "$f" == memory/topics/* ]] || [[ "$f" == memory/MEMORY.md ]] || [[ "$f" == memory/skill-health/* ]] || [[ "$f" == dashboard/outputs/* ]] || [[ "$f" == .outputs/* ]]; then
                    sed -i '/^<<<<<<< /d; /^=======/d; /^>>>>>>> /d' "$f"
                    git add "$f"
                  else
                    git checkout --theirs "$f"
                    git add "$f"
                  fi
                done
                if git diff --cached --quiet; then
                  git rebase --skip || true
                else
                  GIT_EDITOR=true git rebase --continue || true
                fi
              done
            fi
            # Try to push — if it fails, another job beat us, loop and re-pull
            if git push -u origin HEAD 2>/dev/null; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed (ref moved), retrying in ${i}s..."
            sleep "$i"
          done
          echo "Failed to push after 5 attempts"
          exit 1

      - name: Update cron state
        if: always() && steps.skill.outputs.name != ''
        run: |
          SKILL="${{ steps.skill.outputs.name }}"
          RUN_OUTCOME="${{ steps.run.outcome }}"
          NOW_ISO=$(date -u +%FT%TZ)
          STATE_FILE="memory/cron-state.json"
          QUALITY_SCORE="${{ steps.analyze.outputs.QUALITY_SCORE }}"

          # Determine status from step outcome
          if [ "$RUN_OUTCOME" = "success" ]; then
            CRON_STATUS="success"
          else
            CRON_STATUS="failed"
          fi

          # Read error signature if the skill failed
          ERROR_SIG=""
          if [ "$CRON_STATUS" = "failed" ] && [ -f /tmp/skill-error.txt ]; then
            ERROR_SIG=$(cat /tmp/skill-error.txt)
          fi

          # Function: apply quality metrics update to STATE
          apply_state_update() {
            # Core status update
            STATE=$(echo "$STATE" | jq --arg s "$SKILL" --arg st "$CRON_STATUS" --arg ts "$NOW_ISO" \
              '.[$s].last_status = $st | .[$s]["last_" + $st] = $ts')

            # Read current counters from state
            PREV_RUNS=$(echo "$STATE" | jq --arg s "$SKILL" '.[$s].total_runs // 0')
            PREV_SUCC=$(echo "$STATE" | jq --arg s "$SKILL" '.[$s].total_successes // 0')
            PREV_FAIL=$(echo "$STATE" | jq --arg s "$SKILL" '.[$s].total_failures // 0')

            NEW_RUNS=$((PREV_RUNS + 1))
            if [ "$CRON_STATUS" = "success" ]; then
              NEW_SUCC=$((PREV_SUCC + 1))
              NEW_FAIL=$PREV_FAIL
              NEW_CONSEC=0
            else
              NEW_SUCC=$PREV_SUCC
              NEW_FAIL=$((PREV_FAIL + 1))
              PREV_CONSEC=$(echo "$STATE" | jq --arg s "$SKILL" '.[$s].consecutive_failures // 0')
              NEW_CONSEC=$((PREV_CONSEC + 1))
            fi

            RATE=$(jq -n "if $NEW_RUNS > 0 then ($NEW_SUCC / $NEW_RUNS * 100 | round) / 100 else 0 end")

            STATE=$(echo "$STATE" | jq --arg s "$SKILL" \
              --argjson runs "$NEW_RUNS" --argjson succ "$NEW_SUCC" --argjson fail "$NEW_FAIL" \
              --argjson consec "$NEW_CONSEC" --argjson rate "$RATE" '
              .[$s].total_runs = $runs |
              .[$s].total_successes = $succ |
              .[$s].total_failures = $fail |
              .[$s].consecutive_failures = $consec |
              .[$s].success_rate = $rate
            ')

            # Record error signature on failure
            if [ "$CRON_STATUS" = "failed" ] && [ -n "$ERROR_SIG" ]; then
              STATE=$(echo "$STATE" | jq --arg s "$SKILL" --arg err "$ERROR_SIG" \
                '.[$s].last_error = $err')
            fi

            # Record quality score on success (from analysis step)
            if [ -n "$QUALITY_SCORE" ] && [ "$QUALITY_SCORE" != "0" ]; then
              STATE=$(echo "$STATE" | jq --arg s "$SKILL" --argjson q "$QUALITY_SCORE" \
                '.[$s].last_quality_score = $q')
            fi
          }

          # Ensure we're on main with latest
          git checkout main 2>/dev/null || true
          git pull --rebase origin main 2>/dev/null || true

          # Read current state
          if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
            STATE=$(cat "$STATE_FILE")
          else
            STATE='{}'
          fi

          apply_state_update

          mkdir -p memory
          echo "$STATE" | jq '.' > "$STATE_FILE"

          git add "$STATE_FILE"
          if git diff --staged --quiet; then
            echo "No state changes"
            exit 0
          fi

          git commit -m "chore(cron): $SKILL $CRON_STATUS"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main 2>/dev/null && git push -u origin HEAD 2>/dev/null; then
              echo "Cron state updated: $SKILL=$CRON_STATUS"
              exit 0
            fi
            # On conflict, take theirs and re-apply our update
            git rebase --abort 2>/dev/null || true
            git reset --soft HEAD~1 2>/dev/null || true
            git checkout -- "$STATE_FILE" 2>/dev/null || true
            git pull origin main 2>/dev/null || true

            if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
              STATE=$(cat "$STATE_FILE")
            else
              STATE='{}'
            fi
            apply_state_update
            echo "$STATE" | jq '.' > "$STATE_FILE"
            git add "$STATE_FILE"
            git diff --staged --quiet && { echo "State already up to date"; exit 0; }
            git commit -m "chore(cron): $SKILL $CRON_STATUS"
            sleep "$i"
          done
          echo "::warning::Failed to commit cron state (non-fatal)"
